<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanza Org - Dashboard</title>
    <style>
        :root {
            --azul-fundo: #0B1D3A; 
            --azul-card: #142B4E;  
            --azul-cabecalho-input: #1A3A6C;
            --verde-folha: #27AE60; 
            --verde-escuro: #1E8449; 
            --dourado: #D4AF37; 
            --texto-claro: #E0E6ED; 
        }

        /* Centraliza o aplicativo na tela */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--azul-fundo);
            color: var(--texto-claro);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* O "quadro" em volta de todo o layout */
        .dashboard-container {
            background-color: #061124; 
            width: 100%;
            max-width: 950px; 
            border-radius: 16px;
            padding: 30px 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); 
        }

        /* --- CABEÇALHO --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(255, 255, 255, 0.05); 
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px; 
            border-bottom: 4px solid var(--verde-folha); 
            padding-bottom: 10px;
        }

        /* Título do cabeçalho agora é verde */
        header h1 {
            color: var(--verde-folha);
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        header a {
            color: var(--texto-claro);
            text-decoration: none;
            margin-left: 15px;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        header a:hover {
            color: var(--verde-folha);
        }

        /* --- ÁREA PRINCIPAL --- */
        main {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 25px;
        }

        .card {
            background-color: var(--azul-card);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.03); 
        }

        .card h2 {
            color: var(--texto-claro);
            font-size: 1.3rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .card h3 {
            font-size: 1.1rem;
            margin-top: 25px;
            margin-bottom: 10px;
        }

        /* --- ESTILO DA IMAGEM DA META --- */
        .img-meta {
            width: 100%; 
            height: 140px; 
            object-fit: cover; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3); 
        }

        /* --- CAMPOS DE ENTRADA E BOTÃO --- */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            background-color: var(--azul-cabecalho-input); 
            color: white;
            padding: 10px 15px;
            margin-bottom: 0; 
            border-radius: 8px 8px 0 0; 
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            box-sizing: border-box; 
            padding: 12px 15px;
            border-radius: 0 0 8px 8px; 
            border: 1px solid var(--azul-cabecalho-input);
            background-color: #08152B; 
            color: white;
            font-size: 1rem;
        }

        .btn-calcular {
            width: 100%;
            background-color: var(--verde-folha);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s ease, transform 0.1s;
        }

        .btn-calcular:hover {
            background-color: var(--verde-escuro);
        }

        .btn-calcular:active {
            transform: scale(0.98); 
        }

        /* --- RESULTADOS E PROGRESSO --- */
        .resumo-valores {
            background-color: #08152B;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-top: 0;
        }

        .resumo-valores dt {
            font-size: 0.9rem;
            color: #A0B2C6;
        }

        .resumo-valores .destaque {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--dourado); 
            margin: 5px 0 0 0;
        }

        progress {
            width: 100%;
            height: 12px;
            border-radius: 6px;
        }

        progress::-webkit-progress-value { background-color: var(--verde-folha); border-radius: 6px; }
        progress::-webkit-progress-bar { background-color: #08152B; border-radius: 6px; }

        .legenda-progresso {
            font-size: 0.8rem;
            color: #A0B2C6;
            text-align: right;
            margin-top: 5px;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.85rem;
            color: #5C7A99;
        }

        /* =========================================
           RESPONSIVIDADE (MEDIA QUERIES)
           ========================================= */

        /* TABLET (Telas até 992px) */
        @media (max-width: 992px) {
            .dashboard-container {
                padding: 20px 30px;
            }
            header h1 {
                font-size: 1.6rem;
            }
        }

        /* MOBILE (Telas até 768px - Celulares) */
        @media (max-width: 768px) {
            .dashboard-container {
                padding: 15px; 
            }
            
            /* Muda o cabeçalho para coluna */
            header {
                flex-direction: column; 
                gap: 15px;
            }

            /* Transforma o grid de 2 colunas em 1 coluna só */
            main {
                grid-template-columns: 1fr; 
            }

            .card {
                padding: 15px; 
            }

            header h1 {
                font-size: 1.4rem; 
            }
            .card h2 {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <header>
            <div class="logo-container">
                <h1>FINANZA ORG</h1>
            </div>
            
            <nav>
                <a href="metas.html">Metas</a>
                <a href="despesas.html">Despesas</a>
            </nav>
        </header>

        <main>
            <section class="card form-card">
                <h2>Calculadora Mensal</h2>
                <p>Insira seus valores para descobrir sua sobra.</p>
                
                <div class="input-group">
                    <label for="salario">Salário / Receitas (R$)</label>
                    <input type="number" id="salario" placeholder="Ex: 5000">
                </div>

                <div class="input-group">
                    <label for="despesas">Despesas Totais (R$)</label>
                    <input type="number" id="despesas" placeholder="Ex: 3500">
                </div>

                <button type="button" class="btn-calcular" id="btn-calcular">Calcular Sobra</button>
            </section>

            <section class="card result-card">
                <h2>Reserva e Metas</h2>
                
                <dl class="resumo-valores">
                    <dt>Sobra Estimada:</dt>
                    <dd class="destaque" id="resultado-sobra">R$ 0,00</dd> 
                </dl>

                <h3>Viagem de Férias</h3>
                <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=500&q=80" alt="Foto de uma praia tropical" class="img-meta">
                
                <progress value="50" max="100"></progress>
                <p class="legenda-progresso">50% concluído</p>
            </section>
        </main>

        <footer>
            <p>🔒 Seus dados estão protegidos e não são enviados para nenhum servidor.</p>
        </footer>

    </div>

</body>
</html>
