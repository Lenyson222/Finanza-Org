<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição - 1º Hackathon de Informática da Escola</title>
</head>
<body>

    <h1>1º Hackathon de Informática da Escola</h1>
    <p>Preencha o formulário abaixo para garantir sua participação.</p>

    <form action="#" method="post">

        <fieldset>
            <legend>Dados Pessoais</legend>

            <label for="nome">Nome Completo:</label><br>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required><br><br>

            <label for="email">E-mail:</label><br>
            <input type="email" id="email" name="email" placeholder="exemplo@email.com" required><br><br>

            <label for="senha">Senha para o sistema:</label><br>
            <input type="password" id="senha" name="senha" required><br><br>

            <label for="nascimento">Data de Nascimento:</label><br>
            <input type="date" id="nascimento" name="nascimento" required>
        </fieldset>

        <br>

        <fieldset>
            <legend>Perfil Técnico</legend>

            <p>Quais linguagens você tem interesse?</p>
            <input type="checkbox" id="html" name="linguagens" value="html">
            <label for="html">HTML</label><br>
            
            <input type="checkbox" id="css" name="linguagens" value="css">
            <label for="css">CSS</label><br>
            
            <input type="checkbox" id="js" name="linguagens" value="javascript">
            <label for="js">JavaScript</label><br>
            
            <input type="checkbox" id="python" name="linguagens" value="python">
            <label for="python">Python</label><br><br>

            <p>Nível de Experiência:</p>
            <input type="radio" id="iniciante" name="nivel" value="iniciante">
            <label for="iniciante">Iniciante</label><br>
            
            <input type="radio" id="intermediario" name="nivel" value="intermediario">
            <label for="intermediario">Intermediário</label><br>
            
            <input type="radio" id="avancado" name="nivel" value="avancado">
            <label for="avancado">Avançado</label><br><br>

            <label for="curriculo">Anexe seu currículo ou portfólio:</label><br>
            <input type="file" id="curriculo" name="curriculo">
        </fieldset>

        <br>

        <fieldset>
            <legend>Detalhes do Evento</legend>

            <label for="camiseta">Tamanho da Camiseta:</label><br>
            <select id="camiseta" name="camiseta">
                <option value="" disabled selected>Selecione uma opção</option>
                <option value="P">P</option>
                <option value="M">M</option>
                <option value="G">G</option>
                <option value="GG">GG</option>
            </select><br><br>

            <label for="motivacao">Carta de Motivação:</label><br>
            <textarea id="motivacao" name="motivacao" rows="5" cols="40" placeholder="Por que você deseja participar deste Hackathon?"></textarea>
        </fieldset>

        <br>

        <button type="submit">Realizar Inscrição</button>

    </form>

</body>
</html>
